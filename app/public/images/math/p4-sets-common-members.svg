<svg xmlns="http://www.w3.org/2000/svg" width="900" height="254" viewBox="0 0 900 254" role="img" aria-label="Sets and Common Members"><rect width="900" height="254" rx="32" fill="#fffaf0"/><rect x="20" y="20" width="860" height="214" rx="26" fill="#fff" stroke="#e7d7bd" stroke-width="3"/><circle cx="80" cy="72" r="34" fill="#2b6cb0" opacity="0.14"/><text x="62" y="84" font-size="34" font-family="Arial, sans-serif">🟦</text><text x="130" y="64" font-size="30" font-weight="800" fill="#17212b" font-family="Arial, sans-serif">Sets and Common Members</text><text x="130" y="94" font-size="18" fill="#5b6773" font-family="Arial, sans-serif">Form sets, count members, compare and find common members</text>
    <g transform="translate(40,112)"><circle cx="0" cy="0" r="9" fill="#2b6cb0" opacity="0.85"/><text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">A set has a clear rule</text></g>
    <g transform="translate(40,146)"><circle cx="0" cy="0" r="9" fill="#2b6cb0" opacity="0.85"/><text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">n(A) means number of members</text></g>
    <g transform="translate(40,180)"><circle cx="0" cy="0" r="9" fill="#2b6cb0" opacity="0.85"/><text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Equivalent sets have same number</text></g>
    <g transform="translate(40,214)"><circle cx="0" cy="0" r="9" fill="#2b6cb0" opacity="0.85"/><text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Common members are in both sets</text></g>
    <g transform="translate(40,248)"><circle cx="0" cy="0" r="9" fill="#2b6cb0" opacity="0.85"/><text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Empty set has no members</text></g></svg>