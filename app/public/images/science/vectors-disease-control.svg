<svg xmlns="http://www.w3.org/2000/svg" width="900" height="254" viewBox="0 0 900 254" role="img" aria-label="Vectors and Disease Control">
  <rect width="900" height="254" rx="32" fill="#fffaf0"/>
  <rect x="20" y="20" width="860" height="214" rx="26" fill="#ffffff" stroke="#e7d7bd" stroke-width="3"/>
  <circle cx="80" cy="72" r="34" fill="#b83280" opacity="0.14"/>
  <text x="62" y="84" font-size="34" font-family="Arial, sans-serif">🦟</text>
  <text x="130" y="64" font-size="30" font-weight="800" fill="#17212b" font-family="Arial, sans-serif">Vectors and Disease Control</text>
  <text x="130" y="94" font-size="18" fill="#5b6773" font-family="Arial, sans-serif">Reduce disease spread by controlling vectors</text>
  
    <g transform="translate(40,112)">
      <circle cx="0" cy="0" r="9" fill="#b83280" opacity="0.85"/>
      <text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Mosquitoes can spread malaria</text>
    </g>
    <g transform="translate(40,146)">
      <circle cx="0" cy="0" r="9" fill="#b83280" opacity="0.85"/>
      <text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Flies can carry germs to food</text>
    </g>
    <g transform="translate(40,180)">
      <circle cx="0" cy="0" r="9" fill="#b83280" opacity="0.85"/>
      <text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Rats can spread disease</text>
    </g>
    <g transform="translate(40,214)">
      <circle cx="0" cy="0" r="9" fill="#b83280" opacity="0.85"/>
      <text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Drain stagnant water</text>
    </g>
    <g transform="translate(40,248)">
      <circle cx="0" cy="0" r="9" fill="#b83280" opacity="0.85"/>
      <text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Cover food and keep clean</text>
    </g>
</svg>