<svg xmlns="http://www.w3.org/2000/svg" width="900" height="254" viewBox="0 0 900 254" role="img" aria-label="Sanitation"><rect width="900" height="254" rx="32" fill="#fffaf0"/><rect x="20" y="20" width="860" height="214" rx="26" fill="#fff" stroke="#e7d7bd" stroke-width="3"/><circle cx="80" cy="72" r="34" fill="#0f766e" opacity="0.14"/><text x="62" y="84" font-size="34" font-family="Arial, sans-serif">🚮</text><text x="130" y="64" font-size="30" font-weight="800" fill="#17212b" font-family="Arial, sans-serif">Sanitation</text><text x="130" y="94" font-size="18" fill="#5b6773" font-family="Arial, sans-serif">Keep home, school and water sources clean</text>
