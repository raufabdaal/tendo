    <g transform="translate(40,214)"><circle cx="0" cy="0" r="9" fill="#c53030" opacity="0.85"/><text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">For burns: cool water and adult help</text></g></svg>