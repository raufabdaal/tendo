    <g transform="translate(40,112)"><circle cx="0" cy="0" r="9" fill="#c53030" opacity="0.85"/><text x="22" y="5" font-size="18" fill="#243447" font-family="Arial, sans-serif">Keep medicines/chemicals away from children</text></g>
