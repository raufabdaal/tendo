ground:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px;margin:8px 0;cursor:pointer;font-weight:850;display:flex;gap:10px;align-items:center}.choice:hover{border-color:var(--brand)}.choice.correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}.choice.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}.letter{width:28px;height:28px;border-radius:10px;background:#f3eadb;display:grid;place-items:center;font-weight:950;flex:none}.choice.correct .letter{background:var(--green);color:white}.choice.wrong .letter{background:var(--red);color:white}.feedback{border-radius:16px;padding:13px;background:#fff7e8;border:1px solid var(--line);margin:12px 0;color:var(--soft-ink)}

(--line);border-radius:14px;padding:10px}.check input{margin-top:3px}.paper-preview{background:#fff;border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow-soft)}.paper-preview ol{padding-left:24px}.paper-preview li{margin:0 0 14px}.copy-box{background:#fff;border:1px dashed #b9c8eb;border-radius:20px;padding:16px;white-space:pre-wrap;color:var(--soft-ink)}

<div class="ribbon">Interactive UX prototype for <b>Tendo</b> — based on the repo scan. App code is untouched.</div>
<header class="shell">

let state = {role:'learner',grade:'P7',screen:'home',subject:'math',topic:'fractions',filter:'all',query:'',lessonStep:'read',quizIndex:0,answer:null,score:0,teacherTab:'dashboard',worksheet:false,listen:false,practiceStarted:false};
const app = document.getElementById('app');
function syncShell(){
  document.getElementById('brand-sub').textContent = state.role === 'teacher' ? 'Teacher mode' : 'Learner mode';
  document.getElementById('grade-p6').classList.toggle('on', state.grade==='P6');
  document.getElementById('grade-p7').classList.toggle('on', state.grade==='P7');
  document.getElementById('role-learner').classList.toggle('on', state.role==='learner');
  document.getElementById('role-teacher').classList.toggle('on', state.role==='teacher');
  document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active', b.dataset.nav === activeNav()));
  document.querySelectorAll('[data-bottom]').forEach(b=>b.classList.toggle('active', b.dataset.bottom === activeNav()));
}
function activeNav(){ return ['subject','lesson'].includes(state.screen) ? 'study' : state.screen; }
function render(){ syncShell(); app.innerHTML = `<div class="screen">${screenHtml()}</div>`; window.scrollTo(0,0); }
function screenHtml(){
  if(state.screen==='home') return state.role==='teacher' ? teacherHome() : learnerHome();
  if(state.screen==='study') return studyHome();
  if(state.screen==='subject') return subjectPage();
  if(state.screen==='lesson') return lessonPage();
  if(state.screen==='practice') return practicePage();
  if(state.screen==='papers') return papersPage();
  if(state.screen==='teacher') return teacherPage();
  return learnerHome();
}
function setRole(role){ state.role=role; if(role==='teacher') { state.screen='teacher'; state.teacherTab='dashboard'; } else { state.screen='home'; } render(); }
function setGrade(grade){ state.grade=grade; state.screen = state.screen==='teacher' ? 'teacher' : state.screen; render(); }
function go(screen){ state.screen=screen; if(screen==='teacher') state.role='teacher'; render(); }
function goTeacher(){ state.role='teacher'; state.screen='teacher'; render(); }
function openSubject(id){ state.subject=id; state.screen='subject'; state.filter='all'; state.query=''; render(); }
function openTopic(id){ state.topic=id; state.screen='lesson'; state.lessonStep='read'; state.quizIndex=0; state.answer=null; state.score=0; render(); }
function setFilter(f){ state.filter=f; render(); }
function setQuery(v){ state.query=v.toLowerCase(); render(); }
function setStep(s){ state.lessonStep=s; if(s==='try'){state.quizIndex=0;state.answer=null;state.score=0;} render(); }
function chooseAnswer(i){ if(state.answer!==null) return; state.answer=i; if(i===quiz[state.quizIndex].correct) state.score++; render(); }
function nextQuestion(){ if(state.quizIndex < quiz.length-1){ state.quizIndex++; state.answer=null; } else { state.lessonStep='done'; } render(); }
function setTeacherTab(tab){ state.teacherTab=tab; render(); }
function generateWorksheet(){ state.worksheet=true; render(); }
function resetWorksheet(){ state.worksheet=false; render(); }
function toggleListen(){ state.listen=!state.listen; render(); }
function startPractice(){ state.practiceStarted=true; render(); }
function currentSubject(){ return subjects[state.grade].find(s=>s.id===state.subject) || subjects[state.grade][0]; }
function currentTopics(){ return topics[state.subject] || topics.math; }
function currentTopic(){ return currentTopics().find(t=>t.id===state.topic) || currentTopics()[0]; }
function badgeForStatus(t){
  if(t.status==='done') return '<span class="pill good">✓ Strong</span>';
  if(t.status==='continue') return '<span class="pill blue">Continue</span>';
  if(t.status==='needs') return '<span class="pill warn">Needs practice</span>';
  return '<span class="pill">Not started</span>';
}
function subjectCards(){
  return subjects[state.grade].map(s=>`

      <p>${s.desc}</p>
      <div class="meter" aria-hidden="true"><span style="--w:${s.progress}%"></span></div>
      <div class="pill-row"><span class="pill">${s.topics} topics</span><span class="pill blue">${s.questions} questions</span></div>
    </button>`).join('');
}

function topicCard(t){
  const pct = Math.max(2,t.pct);
  return `<button class="topic-card" onclick="openTopic('${t.id}')">
    <div><h3>${t.title}</h3><p>${t.strand} · about ${t.minutes} minutes${t.visual?' · diagram included':''}</p><div class="topic-meta">${badgeForStatus(t)}${t.score!==null?`<span class="pill">Last score ${t.score}%</span>`:''}<span class="pill">${t.minutes} min</span></div></div>
    <div class="progress-ring" style="--pct:${pct}%"><span>${t.pct}%</span></div>
  </button>`;
}

  return `

function lessonStepHtml(t){
  if(state.lessonStep==='watch') return `<div class="video-box"><div><div class="play">▶</div><h2>5-minute teacher video</h2><p style="color:#fff4df">If no video exists yet, this panel says “Video coming soon” and sends the learner to Read.</p><button class="btn primary" onclick="setStep('read')">I watched / skip to Read</button></div></div>`;
  if(state.lessonStep==='read') return `<div class="listen"><div><span class="sound">🔊 Listen mode</span><p class="muted">Useful for younger learners and slow readers.</p></div><button class="btn ${state.listen?'green':'light'}" onclick="toggleListen()">${state.listen?'Playing… pause':'Listen'}</button></div><div class="study-card"><div class="eyebrow">Big idea</div><h2>${t.title}</h2><p>Understand the main rule first, then practise with small questions. For this prototype, the content is shortened; the real app keeps your full topic notes.</p></div><div class="keyword-grid"><div class="keyword"><b>Key word</b><span>Numerator: top number in a fraction.</span></div><div class="keyword"><b>Key word</b><span>Denominator: bottom number showing equal parts.</span></div></div><div class="study-card"><h3>Worked example</h3><p><strong>Problem:</strong> Akello has 24 mangoes. She gives 1/3 to her brother. How many remain?</p><p>1/3 of 24 = 8. Then 24 − 8 = 16.</p><p><strong>Answer: 16 mangoes.</strong></p></div><button class="btn primary block" onclick="setStep('try')">I understand — try 3 questions</button>`;
  if(state.lessonStep==='try'){
    const q=quiz[state.quizIndex];
    const answered=state.answer!==null;
    return `<div class="quiz-card"><div class="eyebrow">Question ${state.quizIndex+1} of ${quiz.length}</div><h2>${q.q}</h2>${q.choices.map((c,i)=>{let cls='choice'; if(answered && i===q.correct) cls+=' correct'; else if(answered && i===state.answer) cls+=' wrong'; return `<button class="${cls}" onclick="chooseAnswer(${i})"><span class="letter">${String.fromCharCode(65+i)}</span><span>${c}</span></button>`}).join('')}${answered?`<div class="feedback"><strong>${state.answer===q.correct?'Correct.':'Not quite.'}</strong> ${q.why}</div><button class="btn primary block" onclick="nextQuestion()">${state.quizIndex===quiz.length-1?'See result':'Next question'}</button>`:''}</div>`;
  }
  const pct=Math.round((state.score/quiz.length)*100);
  return `<div class="study-card" style="text-align:center"><div style="font-size:74px;font-weight:950;color:var(--brand);line-height:1">${state.score}/${quiz.length}</div><h2>${pct >= 70 ? 'Great work.' : 'Good start.'}</h2><p>${pct >= 70 ? 'The topic can be marked strong. Try a new topic or a past-paper section.' : 'Read the worked example once more, then retry.'}</p><div class="toolbar" style="justify-content:center"><button class="btn primary" onclick="openSubject('${state.subject}')">Pick another topic</button><button class="btn light" onclick="setStep('try')">Retake</button><button class="btn green" onclick="go('practice')">Practice more</button></div></div>`;
}
function practicePage(){
  if(state.practiceStarted) return `<div class="breadcrumb"><button onclick="go('practice')">Practice</button><span>›</span><strong>Mixed set</strong></div><section class="lesson-main"><div class="lesson-head"><div class="eyebrow">Practice · ${state.grade}</div><h1>10-question practice</h1><p class="lead">Prototype interaction: answer one sample question and get immediate feedback.</p></div><div class="lesson-body">${lessonStepHtml({title:'Mixed practice'})}</div></section>`;
  return `<div class="section-head"><div><div class="eyebrow">Practice · ${state.grade}</div><h1>Short practice, not a maze.</h1><p class="lead">Kids can start a set without choosing 10 filters. Teachers can still customise worksheets in Teacher mode.</p></div></div><div class="practice-grid"><div class="practice-card"><div class="big">⚡</div><h2>Quick 10</h2><p>Mixed questions from topics Joy has already touched.</p><button class="btn primary block" onclick="startPractice();setStep('try')">Start quick practice</button></div><div class="practice-card"><div class="big">🎯</div><h2>Weak topics</h2><p>Fractions, Algebra, Letter writing. Best for evening prep.</p><button class="btn light block" onclick="openTopic('fractions')">Practise weak topic</button></div><div class="practice-card"><div class="big">🧠</div><h2>Remember yesterday</h2><p>Small revision set from what was studied yesterday.</p><button class="btn light block" onclick="startPractice();setStep('try')">Start recall</button></div><div class="practice-card"><div class="big">🏁</div><h2>Exam sprint</h2><p>15 timed questions, mixed PLE style.</p><button class="btn light block" onclick="go('papers')">Open papers</button></div></div>`;
}
function papersPage(){
  const teacher = state.role==='teacher';
  return `<div class="section-head"><div><div class="eyebrow">PLE papers · ${state.grade}</div><h1>Past papers with two clear uses.</h1><p class="lead">A learner attempts. A teacher browses by topic or prints. Same content, different task labels.</p></div><button class="btn ${teacher?'blue':'primary'}" onclick="setRole('${teacher?'learner':'teacher'}')">Switch to ${teacher?'learner':'teacher'} view</button></div><div class="grid three">${[2018,2019,2020].map(y=>`<div class="card"><div class="pill-row"><span class="pill blue">UNEB representative</span><span class="pill">${y}</span></div><h2>PLE Mathematics ${y}</h2><p>40 questions · 2 hours · explanations included.</p>${teacher?`<button class="btn blue block" onclick="go('teacher');setTeacherTab('worksheet')">Browse by topic / print</button>`:`<button class="btn primary block" onclick="startPractice();setStep('try')">Attempt as learner</button>`}<button class="btn light block" style="margin-top:8px" onclick="alert('Preview: this would open the paper detail screen.')">View details</button></div>`).join('')}</div><div class="callout" style="margin-top:18px"><strong>Design note:</strong> The current repo already separates paper attempt and teacher browse routes. The preview makes that choice visible earlier.</div>`;
}
function teacherPage(){
  return `<div class="breadcrumb"><button onclick="go('home')">Home</button><span>›</span><strong>Teacher</strong></div><div class="section-head"><div><div class="eyebrow">Teacher mode · ${state.grade}</div><h1>Class tools in plain English.</h1><p class="lead">This is the non-tech-teacher version: answers “what should I do next?” before showing details.</p></div><button class="btn light" onclick="setRole('learner')">Back to learner</button></div><div class="teacher-tabs"><button class="${state.teacherTab==='dashboard'?'on':''}" onclick="setTeacherTab('dashboard')">Dashboard</button><button class="${state.teacherTab==='worksheet'?'on':''}" onclick="setTeacherTab('worksheet')">Worksheet maker</button><button class="${state.teacherTab==='reports'?'on':''}" onclick="setTeacherTab('reports')">Parent update</button><button class="${state.teacherTab==='issues'?'on':''}" onclick="setTeacherTab('issues')">Content issues</button></div>${teacherTabHtml()}`;
}
function teacherTabHtml(){
  if(state.teacherTab==='worksheet') return worksheetHtml();
  if(state.teacherTab==='reports') return `<div class="grid two"><div class="card"><h2>Parent update</h2><p>Readable, copy-paste friendly. No spreadsheet language.</p><div class="copy-box">Dear Parent, Joy practised 4 Tendo topics this week. Her strongest topic is Set Concepts. She needs more support in Fractions, Decimals and Percentages. Please encourage 10 minutes of practice before Friday.</div><button class="btn blue" style="margin-top:14px" onclick="alert('Preview: copied parent update.')">Copy update</button></div><div class="card"><h2>Class summary</h2><p>22 learners active · average score 64% · 4 topics need reteaching.</p><p class="muted">In the real app this can use the existing TeacherDashboard data, but change the first screen from tables to action cards.</p></div></div>`;
  if(state.teacherTab==='issues') return `<div class="card"><h2>Content issues</h2><p>Teachers need a simple way to say “this answer is wrong” or “this explanation confused my class”.</p><div class="field"><label>What did you notice?</label><input placeholder="e.g. Question 4 in Fractions has two correct answers"></div><button class="btn blue">Send issue</button></div>`;
  return `<div class="dash-grid"><div class="dash-stat"><b>22</b><span>active learners</span></div><div class="dash-stat"><b>64%</b><span>class average</span></div><div class="dash-stat"><b>4</b><span>topics to reteach</span></div><div class="dash-stat"><b>18</b><span>worksheets made</span></div></div><div class="section-head"><div><h2>Needs attention</h2><p>Sorted by what a teacher should act on first.</p></div><button class="btn blue" onclick="setTeacherTab('worksheet')">Make worksheet from these</button></div><div class="attention">${teacherAttention.map(a=>`<div class="attention-row"><div><h3>${a.topic}</h3><p>${a.subject} · ${a.low} learners below 50% · ${a.action}</p></div><div><div class="bar" style="--w:${a.avg}%"><span></span></div><span class="muted">Class average ${a.avg}%</span></div><button class="btn light small" onclick="setTeacherTab('worksheet')">Use</button></div>`).join('')}</div><div class="section-head"><div><h2>Learners to check</h2><p>Small cards first; detailed drill-down can remain one click away.</p></div></div><div class="grid two">${students.map(s=>`<div class="student-row"><div><strong>${s.name}</strong><p class="muted">${s.topics} topics · average ${s.avg}% · ${s.last}</p></div><span class="pill ${s.avg<50?'warn':s.avg>70?'good':'blue'}">${s.avg<50?'help':s.avg>70?'strong':'okay'}</span></div>`).join('')}</div>`;
}
function worksheetHtml(){
  if(state.worksheet) return `<div class="worksheet"><div class="form-panel"><h2>Worksheet ready</h2><p>Teacher can print, copy to WhatsApp, or reshuffle.</p><button class="btn blue block" onclick="alert('Preview: print dialog would open.')">Print worksheet</button><button class="btn light block" style="margin-top:8px" onclick="alert('Preview: copied worksheet text.')">Copy to WhatsApp</button><button class="btn ghost block" style="margin-top:8px" onclick="resetWorksheet()">Edit choices</button></div><div class="paper-preview"><h2>${state.grade} Mathematics worksheet</h2><p>Name: ____________________ Class: ${state.grade} Date: __________</p><p><strong>Instructions:</strong> Answer all questions. Show working where needed.</p><ol><li>Akello has 24 mangoes. She gives 1/3 to her brother. How many remain?<br>A. 8 &nbsp; B. 12 &nbsp; C. 16 &nbsp; D. 21</li><li>Change 0.25 to a fraction in simplest form.<br>A. 25/10 &nbsp; B. 1/4 &nbsp; C. 2/5 &nbsp; D. 1/2</li><li>Which is greater: 3/4 or 5/8?<br>A. 3/4 &nbsp; B. 5/8 &nbsp; C. Equal &nbsp; D. Cannot tell</li></ol><hr><h3>Answer key</h3><p>1. C — 1/3 of 24 is 8; 24−8=16. 2. B. 3. A.</p></div></div>`;
  return `<div class="worksheet"><div class="form-panel"><h2>Make worksheet</h2><p>Three steps. Defaults do most of the work.</p><div class="field"><label>Class</label><select><option>${state.grade}</option><option>P6</option><option>P7</option></select></div><div class="field"><label>Subject</label><select><option>Mathematics</option><option>English</option><option>Integrated Science</option><option>Social Studies</option><option>Religious Education</option><option>Mixed</option></select></div><div class="field"><label>Number of questions</label><select><option>10 quick questions</option><option>15 standard questions</option><option>25 full prep</option></select></div><button class="btn blue block" onclick="generateWorksheet()">Generate worksheet</button></div><div class="form-panel"><h2>Topics</h2><p class="muted">Pre-select weak topics from the dashboard.</p><div class="check-list">${teacherAttention.map((a,i)=>`<label class="check"><input type="checkbox" checked><span><strong>${a.topic}</strong><br><span class="muted">${a.subject} · class average ${a.avg}%</span></span></label>`).join('')}</div><div class="callout"><strong>Non-tech teacher principle:</strong> “Use weak topics” should be automatic; advanced selection stays optional.</div></div></div>`;
}
render();
</script>
</body>
</html>
